name: Rebuild rollups (analytics)

on:
  schedule:
    # 03:00 Stockholm time = 01:00 UTC (winter) / 02:00 UTC (summer).
    # Run twice to cover both; the script is idempotent.
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch: {}

concurrency:
  group: rollup
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build rollups
        run: node scripts/rollup.mjs

      - name: Commit & push
        run: |
          git config user.name  "transit-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/rollups/
          if git diff --cached --quiet; then
            echo "No rollup changes."
          else
            git pull --rebase --autostash origin main || true
            git commit -m "rollup: $(date -u +%Y-%m-%d) [skip ci]"
            git push origin HEAD:main
          fi
